<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 320px;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 15px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        input::placeholder {
            color: #cbd5f5;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #message.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Enter Company Name</h2>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <br>
        <button onclick="showCompany()">Search</button>
        <div id="message"></div>
    </div>
    
    <script defer>
    console.log("JS Loaded");
async function showCompany() {
    const input = document.getElementById("nameInput").value.trim();
    const message = document.getElementById("message");

    if (!input) return;

    message.innerHTML = `<p style="margin-top:15px;">⏳ Fetching data...</p>`;

    try {
        const response = await fetch(
            `https://financialmodelingprep.com/api/v3/search?query=${input}&limit=1&exchange=NASDAQ&apikey=pbgVjuOCZtP09imu85yn91dtKPkvIPbM`
        );

        const data = await response.json();

        console.log(data); // 👈 ADD THIS (debug)

        if (data && data.length > 0) {
            const company = data[0];

            message.innerHTML = `
<div style="
    background: linear-gradient(145deg, rgba(255,255,255,0.08), rgba(255,255,255,0.03));
    padding: 22px;
    border-radius: 16px;
    margin-top: 20px;
    text-align: left;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
">
    <h3>${company.name}</h3>
    <p><strong>Symbol:</strong> ${company.symbol}</p>
    <p><strong>Exchange:</strong> ${company.exchangeShortName}</p>
</div>
`;
message.classList.add("show");
            
        } else {
            message.innerHTML = `
                <p style="color:#fca5a5; margin-top:15px;">
                    Company not found. Try: AAPL, MSFT, INFY
                </p>
            `;
        }
    } catch (error) {
        message.innerHTML = `
            <p style="color:red; margin-top:15px;">
                Error fetching data. Check API key.
            </p>
        `;
        console.error(error);
    }

    document.getElementById("nameInput").value = "";
}
document.getElementById("nameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        console.log("Enter pressed");
        showCompany();
    }
});
    </script>

</body>
</html>
