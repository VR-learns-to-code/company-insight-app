<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Welcome</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: #e2e8f0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            width: 320px;
        }

        h2 {
            font-weight: 400;
            margin-bottom: 25px;
            letter-spacing: 0.5px;
        }

        input {
            width: 80%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            outline: none;
            font-size: 15px;
            margin-bottom: 15px;
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        input::placeholder {
            color: #cbd5f5;
        }

        button {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            background: #6366f1;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #4f46e5;
            transform: translateY(-1px);
        }

        #message {
            margin-top: 20px;
            font-size: 20px;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #message.show {
            opacity: 1;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Enter Company Name</h2>
        <input type="text" id="nameInput" placeholder="Enter your name">
        <br>
        <button onclick="showCompany()">Search</button>
        <div id="message"></div>
    </div>
    
    <script>
console.log("JS Loaded ✅");

async function showCompany() {
    console.log("Function triggered ✅");

    const input = document.getElementById("nameInput").value.trim().toUpperCase();
    const message = document.getElementById("message");

    if (!input) return;

    message.innerHTML = `<p>⏳ Fetching data...</p>`;

try {
    const response = await fetch("http://localhost:3000/api/company?symbol=" + input);

    console.log("Response received ✅");

    const data = await response.json();
    console.log("DATA 👉", data);

    const result = data?.quoteResponse?.result?.[0];

    if (result) {
        message.innerHTML = `
            <div>
                <h3>${result.longName || "N/A"}</h3>
                <p><strong>Symbol:</strong> ${result.symbol}</p>
                <p><strong>Price:</strong> ${result.regularMarketPrice}</p>
            </div>
        `;
    } else {
        message.innerHTML = `<p style="color:red;">No data found</p>`;
    }

} catch (error) {
    console.error("ERROR 👉", error);
    message.innerHTML = `<p style="color:red;">Error fetching data</p>`;
}
}

document.getElementById("nameInput").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        showCompany();
    }
});
</script>
</body>
</html>
